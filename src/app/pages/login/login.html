<app-default-login-layout title="Faça login com sua Conta"
primaryBtnText="Login"
secundaryBtnText="Registrar"
>
    <form [formGroup]="loginForm">
        <app-primary-input
            formControlName="email"
            inputName="email"
            type="email"
            label="Email"
            placeholder="exemplo@gmail.com"
        >
        <img src="/assets/img/email-icon.svg"/>
        </app-primary-input>
        <app-primary-input
            formControlName="password"
            inputName="password"
            type="password"
            label="Senha"
        >
        <img src="/assets/img/password-icon.svg"/>
        </app-primary-input>
    </form>

</app-default-login-layout>
